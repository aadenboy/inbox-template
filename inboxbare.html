<!DOCTYPE html>
<html>
  <head>
    <title>Inbox template</title>
    <style>
      body {
        margin: 1em;
        font-size: 16px;
      }

      form {
        border: 1px solid gray;
        padding: 1em;
        display: flex;
        flex-direction: column;
        gap: 1em;
        max-width: fit-content;
        margin: 1em auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Inbox template</h1>
      <p>
        This is a template you can use to create a simple Google Forms powered inbox. This version only includes
        basic input elemnents. Visit <a href="inboxdrwa.html">inboxdraw.html</a> if you wish to include a drawing pad.
      </p>
      <form id="form" method="POST" target="_blank" action="https://docs.google.com/forms/d/e/[GOOGLE FORM URL]/formResponse?usp=pp_url">
        <label>Author: <input id="identity" type="text" name="entry.[ENTRY ID]" placeholder="Anonymous" /></label>
        <textarea id="message" name="entry.[ENTRY ID]" placeholder="Message"></textarea>
        <!-- Add more elements as needed. -->
        <button type="submit" id="submit">submit</button>
      </form>
      <i>Inbox forked from <a href="https://github.com/aadenboy/inbox-template">https://github.com/aadenboy/inbox-template</a></i>
      <noscript>
        <p>This inbox requires that you <a href="https://www.enable-javascript.com/">enable javascript</a> to function properly.</p>
      </noscript>
    </main>
    <script>
      const inputs = Array.from(document.querySelectorAll('#form [name^="entry."]'));
      form.addEventListener("submit", (e) => {
        const anyFilled = inputs.some(input => input.value !== "");
        if (!anyFilled) {
          alert("You need to fill in at least one field.");
          e.preventDefault();
          return;
        }
      });
    </script>
  </body>
</html>
