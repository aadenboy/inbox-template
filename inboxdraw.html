<!DOCTYPE html>
<html>
  <head>
    <title>Inbox template with drawing pad</title>
    <style>
      body {
        margin: 1em;
        font-size: 16px;
      }

      form {
        border: 1px solid gray;
        padding: 1em;
        display: flex;
        flex-direction: column;
        gap: 1em;
        max-width: fit-content;
        margin: 1em auto;
      }
    </style>

    <!-- Necessary for Tecknar to function. -->
    <link rel="stylesheet" href="https://aadenboy.github.io/tecknar/src/colorpicker.min.css" />
    <script src="https://aadenboy.github.io/tecknar/src/colorpicker.iife.min.js"></script>
    <script src="https://aadenboy.github.io/tecknar/src/pako.min.js"></script>
    <script src="https://aadenboy.github.io/tecknar/src/tecknar.js"></script>
    <link rel="stylesheet" href="https://aadenboy.github.io/tecknar/src/tecknar.css" />
  </head>
  <body>
    <main>
      <h1>Inbox template</h1>
      <p>
        This is a template you can use to create a simple Google Forms powered inbox. This version includes Tecknar
        assuming you want others to send drawings to you. Visit <a href="inboxbare.html">inboxbare.html</a> if you do not want this.
      </p>
      <form id="form" method="POST" target="_blank" action="https://docs.google.com/forms/d/e/[GOOGLE FORM URL]/formResponse?usp=pp_url">
        <label>Author: <input id="identity" type="text" name="entry.[ENTRY ID]" placeholder="Anonymous" /></label>
        <textarea id="message" name="entry.[ENTRY ID]" placeholder="Message"></textarea>

        <!-- Tecknar -->
        <input type="text" id="canvas-data" name="entry.[ENTRY ID]" style="display: none;" />
        <div id="canvas-area">
          <div id="canvas-container"></div>
        </div>
        <!-- -->

        <!-- Add more elements as needed. -->
        <button type="submit" id="submit">submit</button>
      </form>
      <i>Inbox forked from <a href="https://github.com/aadenboy/inbox-template">https://github.com/aadenboy/inbox-template</a></i>
      <noscript>
        <p>This inbox requires that you <a href="https://www.enable-javascript.com/">enable javascript</a> to function properly.</p>
      </noscript>
    </main>
    <script>
      const tecknar = new Tecknar();
      tecknar.mount("#canvas-container");

      // Prevents inputs in Tecknar from submitting the message.
      const tecknarInputs = document.querySelectorAll(".tecknar-container input, .tecknar-container button");
      tecknarInputs.forEach((input) => {
        if (input.tagName == "BUTTON") input.setAttribute("type", "button");
        else input.addEventListener("keydown", (e) => {
          if (e.key == "Enter") e.preventDefault();
        });
      });

      const form = document.getElementById("form");
      const submit = document.getElementById("submit");
      const canvas = document.getElementById("canvas-data");

      const emptyData = tecknar.export().data;

      const inputs = Array.from(document.querySelectorAll('#form [name^="entry."]'));
      form.addEventListener("submit", (e) => {
        const data = tecknar.export().data;
        canvas.value = data == emptyData ? "" : data; // Prevent an empty canvas from being sent.

        const anyFilled = inputs.some(input => input.value !== "");
        if (!anyFilled) {
          alert("You need to fill in at least one field.");
          e.preventDefault();
          return;
        }
      });
    </script>
  </body>
</html>
